<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>簡易三角學互動教室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* ===== VARIABLES ===== */
:root {
  --bg: #FFFDF7; --bg2: #FFF8EE; --card: #FFFFFF;
  --text: #1C1917; --text2: #57534E; --muted: #A8A29E;
  --border: #E7E5E4;
  --blue: #2563EB; --blue-light: #DBEAFE; --blue-bg: #EFF6FF;
  --green: #16A34A; --green-bg: #DCFCE7;
  --red: #DC2626; --red-bg: #FEE2E2;
  --amber: #D97706; --amber-bg: #FEF3C7;
  --purple: #7C3AED; --purple-bg: #EDE9FE;
  --teal: #0D9488; --teal-bg: #CCFBF1;
  --tri-fill: #EBF5FF; --tri-stroke: #1E293B;
  --shadow: 0 4px 14px rgba(0,0,0,0.08);
  --radius: 16px;
}
.dark {
  --bg: #0C0A09; --bg2: #1C1917; --card: #292524;
  --text: #FAFAF9; --text2: #D6D3D1; --muted: #78716C;
  --border: #44403C;
  --blue-light: #1E3A5F; --blue-bg: #172554;
  --green-bg: #052E16; --red-bg: #450A0A;
  --amber-bg: #451A03; --purple-bg: #2E1065; --teal-bg: #042F2E;
  --tri-fill: #1E293B; --tri-stroke: #CBD5E1;
  --shadow: 0 4px 14px rgba(0,0,0,0.4);
}
/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ===== PAGES ===== */
.page{display:none;height:100vh;height:100dvh;flex-direction:column;overflow:hidden}
.page.active{display:flex}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(2deg)}}
@keyframes wrongFlash{0%{stroke:var(--tri-stroke)}25%{stroke:#DC2626}50%{stroke:var(--tri-stroke)}75%{stroke:#DC2626}100%{stroke:var(--tri-stroke)}}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(.3);opacity:0}}
@keyframes labelPop{from{opacity:0;transform:translate(-50%,-50%) scale(.7)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* ===== HOME PAGE ===== */
#home{background:linear-gradient(135deg,var(--amber-bg) 0%,var(--teal-bg) 40%,var(--blue-bg) 100%);animation:fadeIn .4s ease;justify-content:center}
.floating-shapes{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.floating-shapes span{position:absolute;font-size:1.5rem;opacity:.12;animation:float 6s ease-in-out infinite;font-family:'Source Code Pro',monospace}
.floating-shapes span:nth-child(1){top:12%;left:7%;animation-delay:0s}
.floating-shapes span:nth-child(2){top:22%;right:9%;animation-delay:1s;font-size:1.2rem}
.floating-shapes span:nth-child(3){top:55%;left:4%;animation-delay:2s;font-size:1.8rem}
.floating-shapes span:nth-child(4){top:68%;right:6%;animation-delay:.6s}
.floating-shapes span:nth-child(5){top:40%;left:50%;animation-delay:3s;font-size:1rem}
.home-header{text-align:center;padding:24px 20px 12px;position:relative}
.home-header h1{font-family:'Josefin Sans','Noto Sans TC',sans-serif;font-size:2.2rem;font-weight:700;background:linear-gradient(135deg,var(--amber),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;letter-spacing:-.5px}
.home-header .subtitle{font-size:.95rem;color:var(--text2)}
.home-header .badge{display:inline-block;background:var(--amber);color:#fff;font-size:.75rem;padding:3px 12px;border-radius:20px;margin-top:10px;font-weight:500}
.game-grid{display:grid;grid-template-columns:1fr;gap:12px;padding:12px 20px 20px;max-width:560px;margin:0 auto;width:100%}
.game-card{background:var(--card);border-radius:var(--radius);padding:22px 20px;cursor:pointer;box-shadow:var(--shadow);border:1px solid var(--border);transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;animation:slideUp .5s ease backwards}
.game-card:nth-child(1){animation-delay:.05s}
.game-card:nth-child(2){animation-delay:.12s}
.game-card:nth-child(3){animation-delay:.19s}
.game-card:active{transform:scale(.97)}
@media(hover:hover){.game-card:not(.disabled):hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.12)}}
.game-card .card-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:12px;color:#fff}
.game-card .card-title{font-weight:700;font-size:1.05rem;margin-bottom:4px}
.game-card .card-desc{font-size:.84rem;color:var(--text2);line-height:1.5}
.game-card .card-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;transition:transform .2s}
@media(hover:hover){.game-card:not(.disabled):hover .card-arrow{transform:translateY(-50%) translateX(3px)}}
.card-c1 .card-icon{background:linear-gradient(135deg,#D97706,#F59E0B)}
.card-c2 .card-icon{background:linear-gradient(135deg,#7C3AED,#A78BFA)}
.card-c3 .card-icon{background:linear-gradient(135deg,#0D9488,#14B8A6)}
.game-card.disabled{opacity:.55;cursor:default;pointer-events:none}
.game-card .coming-soon{position:absolute;top:12px;right:12px;background:var(--muted);color:#fff;font-size:.7rem;padding:2px 10px;border-radius:10px;font-weight:500}


/* ===== GAME PAGE ===== */
.game-page{background:var(--bg)}
.game-topbar{display:flex;align-items:center;padding:10px 14px;background:var(--card);border-bottom:1px solid var(--border);z-index:10;gap:10px;flex-shrink:0}
.btn-back{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-back:active{background:var(--border)}
.game-topbar .game-title{font-weight:700;font-size:.95rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qnum-badge{font-size:.82rem;font-weight:600;color:var(--text2);flex-shrink:0;white-space:nowrap}
.score-badge{display:flex;align-items:center;gap:5px;background:var(--amber-bg);color:var(--amber);padding:5px 12px;border-radius:18px;font-weight:600;font-size:.85rem;flex-shrink:0}
.streak-badge{display:flex;align-items:center;gap:3px;background:var(--red-bg);color:var(--red);padding:5px 9px;border-radius:18px;font-weight:600;font-size:.82rem;flex-shrink:0;transition:transform .3s}
.streak-badge.hot{animation:pulse .5s ease}
.game-body{flex:1;padding:10px 14px;max-width:520px;margin:0 auto;width:100%;overflow:hidden;display:flex;flex-direction:column}
.game-layout{display:flex;flex-direction:column;flex:1;min-height:0}
.game-left{flex:1;min-height:0;display:flex;flex-direction:column}
.game-right{flex-shrink:0}

/* ===== INSTRUCTION CARD ===== */
.instruction-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:10px 14px;margin-bottom:8px;text-align:center;font-size:1.1rem;line-height:1.6;box-shadow:var(--shadow);animation:fadeIn .3s ease;flex-shrink:0}
.inst-active{color:var(--blue);font-weight:700;padding:2px 10px;background:var(--blue-light);border-radius:8px;display:inline-block}
.inst-pending{color:var(--muted);font-weight:500}
.inst-done{color:var(--green);font-weight:700}
.inst-arrow{color:var(--muted);margin:0 6px;font-weight:400}

/* ===== TRIANGLE CONTAINER ===== */
.tri-container{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:visible;margin-bottom:8px;touch-action:manipulation;flex:1 1 0%;min-height:0;display:flex;align-items:center;justify-content:center}
.tri-container svg{display:block;width:100%;height:100%;max-height:100%;user-select:none;-webkit-user-select:none}

/* ===== SVG SIDE STYLES ===== */
.side-vis{transition:stroke .2s ease,stroke-width .2s ease;stroke-linecap:round}
.side-group:not(.selected):not(.wrong-anim) .side-hit{cursor:pointer}
.side-group.selected .side-vis{stroke:var(--blue)!important;stroke-width:5!important}
.side-group.wrong-anim .side-vis{animation:wrongFlash .5s ease;stroke-width:5!important}
.side-group.disabled .side-hit{cursor:default;pointer-events:none}

/* hover only on devices that support it */
@media(hover:hover){
  .side-group:not(.selected):not(.disabled):hover .side-vis{stroke:rgba(37,99,235,.5)!important;stroke-width:5!important}
}

/* ===== FEEDBACK / BUTTONS ===== */
.feedback-bar{text-align:center;padding:10px;border-radius:12px;font-weight:600;font-size:.92rem;flex-shrink:0;margin-top:4px;min-height:38px;visibility:hidden}
.feedback-bar.correct{visibility:visible;background:var(--green-bg);color:var(--green);border:1px solid var(--green);animation:popIn .3s ease}
.feedback-bar.wrong{visibility:visible;background:var(--red-bg);color:var(--red);border:1px solid var(--red);animation:popIn .3s ease}
.btn-next{width:100%;height:50px;border:none;border-radius:12px;font-size:1rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;color:#fff;background:linear-gradient(135deg,var(--amber),#B45309);display:none;margin-bottom:10px;transition:transform .15s}
.btn-next:active{transform:scale(.97)}

/* ===== TOAST ===== */
.toast-box{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:1000;pointer-events:none}
.toast{padding:10px 22px;border-radius:12px;font-weight:600;font-size:.9rem;box-shadow:0 6px 24px rgba(0,0,0,.18);animation:popIn .25s ease,toastOut .3s ease 1.8s forwards;white-space:nowrap}
.toast.success{background:var(--green);color:#fff}
.toast.error{background:var(--red);color:#fff}
@keyframes toastOut{to{opacity:0;transform:scale(.9) translateY(-8px)}}

/* ===== TRIANGLE-LOCAL TOAST ===== */
.tri-toast-box{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:6;pointer-events:none;display:flex;flex-direction:column;align-items:center}

/* ===== CONFETTI ===== */
.confetti-box{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden}
.confetti-piece{position:absolute;animation:confettiFall 1.5s ease-out forwards}

/* ===== SIDE LABELS ===== */
.side-label-wrap{position:absolute;transform:translate(-50%,-50%);animation:labelPop .3s ease backwards;pointer-events:none}
.side-label-tag{padding:3px 10px;border-radius:8px;font-size:.82rem;font-weight:700;white-space:nowrap;font-family:'Noto Sans TC',sans-serif}

/* ===== SIDE HINTS (stacked below triangle) ===== */
.hint-stack{display:flex;flex-direction:column;gap:4px;margin-bottom:4px;flex-shrink:0;min-height:62px}
.side-hint{border-radius:10px;padding:6px 12px;font-size:.84rem;font-weight:600;font-family:'Noto Sans TC',sans-serif;animation:slideUp .3s ease backwards;line-height:1.4}

/* ===== RATIO QUESTION CARD ===== */
.ratio-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);animation:slideUp .3s ease}
.ratio-question{text-align:center;font-weight:600;margin-bottom:16px;color:var(--text)}
/* visual fraction */
.frac-display{display:flex;justify-content:center;margin-bottom:12px}
.frac{display:inline-flex;flex-direction:column;align-items:center;background:var(--purple-bg);padding:12px 28px;border-radius:14px;gap:0}
.frac-num,.frac-den{font-family:'Noto Sans TC',sans-serif;font-size:1.25rem;font-weight:700;padding:4px 6px;line-height:1.3}
.frac-line{width:100%;height:3px;background:var(--purple);border-radius:2px;margin:2px 0}
.ratio-q-text{font-size:1rem;line-height:1.6;margin-top:4px}
.ratio-btns{display:flex;gap:10px}
.ratio-btn{flex:1;height:50px;border:2px solid var(--border);border-radius:12px;background:var(--bg2);color:var(--text);font-size:1.05rem;font-weight:700;font-family:'Source Code Pro','Noto Sans TC',sans-serif;cursor:pointer;transition:transform .15s,border-color .2s,background .2s}
.ratio-btn:active{transform:scale(.96)}
@media(hover:hover){.ratio-btn:hover{border-color:var(--purple);background:var(--purple-bg)}}
.ratio-btn.correct-ratio{background:var(--green-bg)!important;border-color:var(--green)!important;color:var(--green)!important}
.ratio-btn.wrong-ratio{background:var(--red-bg)!important;border-color:var(--red)!important;color:var(--red)!important;animation:shake .4s ease}
.ratio-btn.disabled-ratio{pointer-events:none;opacity:.5}
.ratio-feedback{text-align:center;margin-top:12px;font-weight:600;font-size:.92rem;animation:fadeIn .3s ease}

/* ===== SCORE BADGES ===== */
.score-badge.score-ratio{background:var(--purple-bg);color:var(--purple)}

/* ===== LANDSCAPE (iPad) LAYOUT ===== */
@media(min-width:700px) and (orientation:landscape){
  .game-topbar{padding:8px 14px}
  .progress-wrap{padding:4px 14px}
  .game-body{max-width:960px;padding:8px 20px;flex:1;overflow:hidden}
  .game-layout{flex-direction:row;gap:20px;align-items:stretch;flex:1;min-height:0}
  .game-left{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column}
  .game-right{width:280px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center}
  .instruction-card{padding:8px 14px;margin-bottom:6px;font-size:1rem}
  .tri-container{margin-bottom:6px;flex:1;min-height:0;max-height:calc(100dvh - 340px)}
  .hint-stack{margin-bottom:4px;min-height:62px}
  .ratio-card{margin-bottom:10px;padding:14px}
  .ratio-btns{flex-direction:column;gap:8px}
  .ratio-btn{height:48px;font-size:1.1rem}
  .btn-next{font-size:1rem;height:44px}
  .frac{padding:10px 24px}
  .frac-num,.frac-den{font-size:1.3rem}
  .feedback-bar{padding:8px;font-size:.88rem;margin-top:4px}
}

/* ===== PROGRESS DOTS ===== */
.progress-wrap{display:flex;align-items:center;gap:6px;padding:5px 14px;justify-content:center;flex-shrink:0}
.progress-dot{width:28px;height:6px;border-radius:3px;background:var(--border);transition:background .3s ease,transform .3s ease}
.progress-dot.done-ok{background:var(--green)}
.progress-dot.done-err{background:var(--amber)}
.progress-dot.current{background:var(--blue);transform:scaleY(1.3)}

/* ===== RESULTS OVERLAY ===== */
.results-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s ease}
.results-overlay.active{display:flex}
.results-card{background:var(--card);border-radius:24px;padding:36px 28px;text-align:center;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:popIn .4s ease}
.results-emoji{font-size:3.5rem;margin-bottom:8px}
.results-title{font-family:'Josefin Sans','Noto Sans TC',sans-serif;font-size:1.7rem;font-weight:700;color:var(--text);margin-bottom:18px}
.results-scores-row{display:flex;justify-content:center;gap:24px;margin-bottom:14px}
.results-score-ring{text-align:center}
.ring-label{font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:6px}
.ring-wrap{position:relative;width:100px;height:100px;margin:0 auto}
.ring-svg{width:100%;height:100%}
.ring-bg{stroke:var(--border)}
.ring-fill,.ring-fill-2{stroke:var(--green);stroke-dasharray:326.73;stroke-dashoffset:326.73;transition:stroke-dashoffset 1s ease .3s,stroke 1s ease .3s}
.ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Source Code Pro',monospace;font-size:1.4rem;font-weight:700;color:var(--text)}
.results-msg{font-size:.95rem;color:var(--text2);margin-bottom:24px;line-height:1.6}
.results-btns{display:flex;flex-direction:column;gap:10px}
.rbtn{height:50px;border:none;border-radius:14px;font-size:1rem;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s}
.rbtn:active{transform:scale(.97)}
.rbtn-primary{background:linear-gradient(135deg,var(--amber),#B45309);color:#fff}
.rbtn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
</style>
</head>
<body>

<!-- ====== HOME ====== -->
<div id="home" class="page active">
  <div class="floating-shapes">
    <span>sin</span><span>cos</span><span>tan</span><span>θ</span><span>△</span>
  </div>
  <div class="home-header">
    <h1>簡易三角學互動教室</h1>
    <div class="subtitle">Interactive Trigonometry Games</div>
    <div class="badge">中三數學科</div>
  </div>
  <div class="game-grid">
    <div class="game-card card-c1" onclick="startGame()">
      <div class="card-icon"><i class="fas fa-draw-polygon"></i></div>
      <div class="card-title">辨認各邊、辨認三角比</div>
      <div class="card-desc">在直角三角形中，按次序點擊指定的邊（對、鄰、斜）。<br>然後點擊對應的三角比（sin, cos, tan）</div>
      <div class="card-arrow"><i class="fas fa-chevron-right"></i></div>
    </div>
    <div class="game-card card-c2 disabled">
      <div class="card-icon"><i class="fas fa-calculator"></i></div>
      <div class="card-title">遊戲二</div>
      <div class="card-desc">即將推出，敬請期待</div>
      <div class="coming-soon">即將推出</div>
    </div>
    <div class="game-card card-c3 disabled">
      <div class="card-icon"><i class="fas fa-ruler-combined"></i></div>
      <div class="card-title">遊戲三</div>
      <div class="card-desc">即將推出，敬請期待</div>
      <div class="coming-soon">即將推出</div>
    </div>
  </div>
</div>

<!-- ====== GAME 1 ====== -->
<div id="game1" class="page game-page">
  <div class="game-topbar">
    <button class="btn-back" onclick="goHome()"><i class="fas fa-arrow-left"></i></button>
    <div class="game-title">辨認三角比的邊</div>
    <div class="qnum-badge" id="g-qnum">第 1/6 題</div>
    <div class="streak-badge" id="g-streak"><i class="fas fa-fire"></i> <span>0</span></div>
    <div class="score-badge" id="g-score"><i class="fas fa-star"></i> <span>0/0</span></div>
    <div class="score-badge score-ratio" id="g-ratio-score"><i class="fas fa-superscript"></i> <span>0/0</span></div>
  </div>
  <div class="progress-wrap" id="progress-dots"></div>
  <div class="game-body">
    <div class="game-layout">
      <div class="game-left">
        <div class="instruction-card" id="instruction"></div>
        <div class="tri-container" id="tri-wrap" style="position:relative">
          <svg id="tri-svg" viewBox="0 0 420 380"></svg>
          <div class="tri-toast-box" id="tri-toast-box"></div>
        </div>
        <div class="hint-stack" id="hint-stack"></div>
        <div class="feedback-bar" id="feedback"></div>
      </div>
      <div class="game-right" id="game-right">
        <div class="ratio-card" id="ratio-card" style="display:none">
          <div class="ratio-question" id="ratio-question"></div>
          <div class="ratio-btns">
            <button class="ratio-btn" data-ratio="sin" onclick="handleRatioClick('sin',this)">sin θ</button>
            <button class="ratio-btn" data-ratio="cos" onclick="handleRatioClick('cos',this)">cos θ</button>
            <button class="ratio-btn" data-ratio="tan" onclick="handleRatioClick('tan',this)">tan θ</button>
          </div>
          <div class="ratio-feedback" id="ratio-feedback"></div>
        </div>
        <button class="btn-next" id="next-btn" onclick="newQuestion()">下一題 →</button>
      </div>
    </div>
  </div>
</div>

<!-- ====== RESULTS OVERLAY ====== -->
<div class="results-overlay" id="results-overlay">
  <div class="results-card">
    <div class="results-emoji" id="results-emoji">🎉</div>
    <div class="results-title" id="results-title">做得好！</div>
    <div class="results-scores-row">
      <div class="results-score-ring">
        <div class="ring-label">辨認各邊</div>
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="52" fill="none" stroke-width="8"/>
            <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52" fill="none" stroke-width="8" stroke-linecap="round" transform="rotate(-90 60 60)"/>
          </svg>
          <div class="ring-text" id="ring-text">0/6</div>
        </div>
      </div>
      <div class="results-score-ring">
        <div class="ring-label">三角比</div>
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="52" fill="none" stroke-width="8"/>
            <circle class="ring-fill ring-fill-2" id="ring-fill-2" cx="60" cy="60" r="52" fill="none" stroke-width="8" stroke-linecap="round" transform="rotate(-90 60 60)"/>
          </svg>
          <div class="ring-text" id="ring-text-2">0/6</div>
        </div>
      </div>
    </div>
    <div class="results-msg" id="results-msg">繼續努力！</div>
    <div class="results-btns">
      <button class="rbtn rbtn-primary" onclick="replayGame()"><i class="fas fa-redo"></i> 再玩一次</button>
      <button class="rbtn rbtn-secondary" onclick="goHomeFromResults()"><i class="fas fa-home"></i> 回到目錄</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-box" id="toast-box"></div>

<script>
/* ===== DARK MODE ===== */
if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches){document.documentElement.classList.add('dark')}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(e){if(e.matches){document.documentElement.classList.add('dark')}else{document.documentElement.classList.remove('dark')}});

/* ===== CONSTANTS ===== */
var SIDE_NAMES = {opp:'對邊', adj:'鄰邊', hyp:'斜邊'};
var SIDE_COLORS = {opp:'#2563EB', adj:'#059669', hyp:'#9333EA'};
var SIDE_BG = {opp:'#DBEAFE', adj:'#DCFCE7', hyp:'#EDE9FE'};
var SIDE_HINTS = {opp:'對邊：在考慮的角 θ 的對面', adj:'鄰邊：在考慮的角 θ 與直角之間', hyp:'斜邊：最長的一條邊'};
var RATIO_MAP = {'opp_hyp':'sin','adj_hyp':'cos','opp_adj':'tan'};
var RATIO_NAMES = {sin:'sin θ',cos:'cos θ',tan:'tan θ'};

/* 8 right-triangle presets: v[0]=right-angle vertex, v[1], v[2]=other vertices
   All verified: dot(v0→v1, v0→v2) = 0 */
var TRIANGLES = [
  {v:[[70,315],[370,315],[70,55]]},
  {v:[[370,315],[70,315],[370,55]]},
  {v:[[60,305],[380,305],[60,155]]},
  {v:[[380,305],[60,305],[380,155]]},
  {v:[[70,55],[370,55],[70,315]]},
  {v:[[370,55],[70,55],[370,315]]},
  {v:[[260,315],[80,195],[380,135]]},
  {v:[[160,315],[340,195],[40,135]]}
];

var QUESTIONS = [
  {first:'opp',second:'hyp'},
  {first:'adj',second:'hyp'},
  {first:'opp',second:'adj'}
];
var TOTAL_QUESTIONS = 6;

/* ===== GAME STATE ===== */
var G = {step:0, q:null, triIdx:0, thetaIdx:1, sides:null, hadError:false, score:0, total:0, streak:0, locked:false, lastTriIdx:-1, lastQIdx:-1, qNum:0, qResults:[], ratioScore:0, ratioTotal:0, ratioHadError:false, ratioResults:[], phase:'sides'};

/* ===== NAVIGATION ===== */
function showPage(id){var ps=document.querySelectorAll('.page');for(var i=0;i<ps.length;i++){ps[i].classList.remove('active')}document.getElementById(id).classList.add('active');document.getElementById(id).style.animation='none';void document.getElementById(id).offsetHeight;document.getElementById(id).style.animation='fadeIn .35s ease';window.scrollTo(0,0)}
function goHome(){showPage('home');hideResults()}
function startGame(){
  G.score=0;G.total=0;G.streak=0;G.qNum=0;G.lastTriIdx=-1;G.lastQIdx=-1;
  G.qResults=[];G.ratioScore=0;G.ratioTotal=0;G.ratioResults=[];G.phase='sides';
  updateScore();
  updateRatioScore();
  buildProgressDots();
  showPage('game1');
  newQuestion();
}
function replayGame(){hideResults();startGame()}
function goHomeFromResults(){hideResults();goHome()}
function hideResults(){document.getElementById('results-overlay').classList.remove('active')}
function buildProgressDots(){
  var wrap=document.getElementById('progress-dots');
  var h='';
  for(var i=0;i<TOTAL_QUESTIONS;i++){h+='<div class="progress-dot" id="pdot-'+i+'"></div>'}
  wrap.innerHTML=h;
}
function updateProgressDots(){
  for(var i=0;i<TOTAL_QUESTIONS;i++){
    var dot=document.getElementById('pdot-'+i);
    if(!dot)continue;
    dot.className='progress-dot';
    if(i<G.qResults.length){
      dot.classList.add(G.qResults[i]?'done-ok':'done-err');
    }else if(i===G.qNum-1){
      dot.classList.add('current');
    }
  }
}

/* ===== UTILITIES ===== */
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function showToast(msg,type){
  var c=(type==='error')?document.getElementById('tri-toast-box'):document.getElementById('toast-box');
  if(!c)c=document.getElementById('toast-box');
  var t=document.createElement('div');t.className='toast '+type;t.textContent=msg;c.appendChild(t);setTimeout(function(){if(t.parentNode){t.parentNode.removeChild(t)}},2300);
}

function spawnConfetti(){var c=document.createElement('div');c.className='confetti-box';document.body.appendChild(c);var cols=['#D97706','#0D9488','#7C3AED','#DB2777','#2563EB','#16A34A','#EAB308'];for(var i=0;i<28;i++){var p=document.createElement('div');p.className='confetti-piece';p.style.left=rand(5,95)+'%';p.style.top=rand(-10,20)+'%';p.style.background=cols[rand(0,cols.length-1)];p.style.animationDelay=(Math.random()*.5)+'s';p.style.animationDuration=(1+Math.random())+'s';p.style.width=rand(6,12)+'px';p.style.height=rand(6,12)+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';c.appendChild(p)}setTimeout(function(){if(c.parentNode){c.parentNode.removeChild(c)}},2600)}

/* ===== DRAWING HELPERS ===== */
function drawRightAngle(R,vA,vB){
  var sz=14;
  var dAx=vA[0]-R[0],dAy=vA[1]-R[1],lA=Math.sqrt(dAx*dAx+dAy*dAy);
  var uAx=dAx/lA,uAy=dAy/lA;
  var dBx=vB[0]-R[0],dBy=vB[1]-R[1],lB=Math.sqrt(dBx*dBx+dBy*dBy);
  var uBx=dBx/lB,uBy=dBy/lB;
  var p1=[R[0]+uAx*sz,R[1]+uAy*sz];
  var p2=[R[0]+(uAx+uBx)*sz,R[1]+(uAy+uBy)*sz];
  var p3=[R[0]+uBx*sz,R[1]+uBy*sz];
  return '<polyline points="'+p1[0].toFixed(1)+','+p1[1].toFixed(1)+' '+p2[0].toFixed(1)+','+p2[1].toFixed(1)+' '+p3[0].toFixed(1)+','+p3[1].toFixed(1)+'" fill="none" stroke="var(--tri-stroke)" stroke-width="1.5" opacity=".7"/>';
}

function drawThetaArc(T,vA,vB){
  var r=26;
  var angA=Math.atan2(vA[1]-T[1],vA[0]-T[0]);
  var angB=Math.atan2(vB[1]-T[1],vB[0]-T[0]);
  var diff=angB-angA;
  while(diff>Math.PI)diff-=2*Math.PI;
  while(diff<-Math.PI)diff+=2*Math.PI;
  var n=20;
  var pts=T[0].toFixed(1)+','+T[1].toFixed(1);
  for(var i=0;i<=n;i++){
    var t=i/n;
    var a=angA+t*diff;
    pts+=' '+(T[0]+r*Math.cos(a)).toFixed(1)+','+(T[1]+r*Math.sin(a)).toFixed(1);
  }
  var midA=angA+diff/2;
  var lr=r+16;
  var lx=(T[0]+lr*Math.cos(midA)).toFixed(1);
  var ly=(T[1]+lr*Math.sin(midA)+5).toFixed(1);
  var html='<polygon points="'+pts+'" fill="rgba(37,99,235,.12)" stroke="#3B82F6" stroke-width="1.5"/>';
  html+='<text x="'+lx+'" y="'+ly+'" font-size="18" fill="#2563EB" text-anchor="middle" font-style="italic" font-family="serif">θ</text>';
  return html;
}

function makeSideLine(key,x1,y1,x2,y2){
  var html='<g class="side-group" data-side="'+key+'">';
  html+='<line class="side-vis" x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'" stroke="var(--tri-stroke)" stroke-width="3" pointer-events="none"/>';
  html+='<line class="side-hit" x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'" stroke="transparent" stroke-width="40" pointer-events="stroke" style="cursor:pointer"/>';
  html+='</g>';
  return html;
}

/* ===== DRAW TRIANGLE ===== */
function drawTriangle(){
  var tri=TRIANGLES[G.triIdx];
  var R=tri.v[0];
  var tIdx=G.thetaIdx;
  var oIdx=(tIdx===1)?2:1;
  var T=tri.v[tIdx];
  var O=tri.v[oIdx];
  var vA=tri.v[1];
  var vB=tri.v[2];
  var svg=document.getElementById('tri-svg');
  var h='';
  /* fill */
  h+='<polygon points="'+R[0]+','+R[1]+' '+vA[0]+','+vA[1]+' '+vB[0]+','+vB[1]+'" fill="var(--tri-fill)" stroke="none"/>';
  /* right angle marker */
  h+=drawRightAngle(R,vA,vB);
  /* theta arc */
  var tNeighbors=[R,O];
  /* T connects to R (adjacent) and O (hypotenuse on the other end). But for the arc, we need the two OTHER vertices as seen from T */
  h+=drawThetaArc(T,R,O);
  /* sides */
  h+=makeSideLine('hyp',T[0],T[1],O[0],O[1]);
  h+=makeSideLine('opp',R[0],R[1],O[0],O[1]);
  h+=makeSideLine('adj',R[0],R[1],T[0],T[1]);
  svg.innerHTML=h;
  /* store side endpoints for labels later */
  G.sides={
    hyp:{from:T,to:O},
    opp:{from:R,to:O},
    adj:{from:R,to:T}
  };
  G.centroid=[(R[0]+T[0]+O[0])/3,(R[1]+T[1]+O[1])/3];
}

/* ===== INSTRUCTION ===== */
function updateInstruction(){
  var el=document.getElementById('instruction');
  var n1=SIDE_NAMES[G.q.first];
  var n2=SIDE_NAMES[G.q.second];
  if(G.step===0){
    el.innerHTML='點擊<span class="inst-active">'+n1+'</span>，然後<span class="inst-pending">'+n2+'</span>。';
  }else if(G.step===1){
    el.innerHTML='<span class="inst-done">✓ '+n1+'</span><span class="inst-arrow">→</span>點擊<span class="inst-active">'+n2+'</span>';
  }else{
    el.innerHTML='<span class="inst-done">✓ '+n1+'</span><span class="inst-arrow">→</span><span class="inst-done">✓ '+n2+'</span>';
  }
}

/* ===== SCORE ===== */
function updateScore(){
  document.getElementById('g-score').querySelector('span').textContent=G.score+'/'+G.total;
  document.getElementById('g-qnum').textContent='第 '+G.qNum+'/'+TOTAL_QUESTIONS+' 題';
  var sk=document.getElementById('g-streak');
  sk.querySelector('span').textContent=G.streak;
  if(G.streak>=3){sk.classList.add('hot');setTimeout(function(){sk.classList.remove('hot')},500)}
}

/* ===== NEW QUESTION ===== */
function newQuestion(){
  if(G.qNum>=TOTAL_QUESTIONS){showResults();return}
  G.qNum++;
  /* pick triangle (avoid repeating same one) */
  var ti;
  do{ti=rand(0,TRIANGLES.length-1)}while(ti===G.lastTriIdx&&TRIANGLES.length>1);
  G.lastTriIdx=ti;
  G.triIdx=ti;
  G.thetaIdx=Math.random()>.5?1:2;
  /* pick question (avoid repeating) */
  var qi;
  do{qi=rand(0,QUESTIONS.length-1)}while(qi===G.lastQIdx&&QUESTIONS.length>1);
  G.lastQIdx=qi;
  G.q=QUESTIONS[qi];
  G.step=0;
  G.hadError=false;
  G.locked=false;
  G.phase='sides';
  drawTriangle();
  updateInstruction();
  updateProgressDots();
  document.getElementById('feedback').className='feedback-bar';
  document.getElementById('feedback').textContent='';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('ratio-card').style.display='none';
  /* remove old labels and hints */
  var oldEls=document.querySelectorAll('.side-label-wrap');
  for(var i=0;i<oldEls.length;i++){oldEls[i].parentNode.removeChild(oldEls[i])}
  document.getElementById('hint-stack').innerHTML='';
}

/* ===== CLICK HANDLER ===== */
document.getElementById('tri-svg').addEventListener('click',function(e){
  if(G.locked)return;
  var el=e.target;
  var group=null;
  while(el&&el.tagName!=='svg'){
    if(el.classList&&el.classList.contains('side-group')){group=el;break}
    el=el.parentNode;
  }
  if(!group||!group.dataset.side)return;
  var clicked=group.dataset.side;
  handleClick(clicked,group);
});

function showSideHint(sideKey){
  var stack=document.getElementById('hint-stack');
  var hint=document.createElement('div');
  hint.className='side-hint';
  hint.style.background=SIDE_BG[sideKey];
  hint.style.color=SIDE_COLORS[sideKey];
  hint.textContent=SIDE_HINTS[sideKey];
  stack.appendChild(hint);
}

function handleClick(clicked,groupEl){
  var target=(G.step===0)?G.q.first:G.q.second;
  if(clicked===target){
    /* correct */
    groupEl.classList.add('selected');
    groupEl.classList.add('disabled');
    showSideHint(clicked);
    G.step++;
    if(G.step===2){
      completeQuestion();
    }else{
      updateInstruction();
    }
  }else{
    /* check if clicking already-selected side */
    if(groupEl.classList.contains('selected'))return;
    /* wrong */
    G.hadError=true;
    groupEl.classList.add('wrong-anim');
    setTimeout(function(){groupEl.classList.remove('wrong-anim')},550);
    var clickedName=SIDE_NAMES[clicked];
    var targetName=SIDE_NAMES[target];
    showToast('這是'+clickedName+'，不是'+targetName+'！','error');
  }
}

/* ===== COMPLETE SIDES ===== */
function completeQuestion(){
  G.locked=true;
  G.total++;
  var perfect=!G.hadError;
  G.qResults.push(perfect);
  updateInstruction();
  updateProgressDots();
  var fb=document.getElementById('feedback');
  if(perfect){
    G.score++;
    G.streak++;
    fb.className='feedback-bar correct';
    fb.textContent='✓ 完美！兩步都答對了！';
    if(G.streak>=3){spawnConfetti()}
    showToast('完美！','success');
  }else{
    G.streak=0;
    fb.className='feedback-bar correct';
    fb.textContent='✓ 正確！繼續加油！';
  }
  updateScore();
  showSideLabels();
  /* show ratio question after a brief pause */
  setTimeout(function(){showRatioQuestion()},600);
}

/* ===== RATIO QUESTION ===== */
function showRatioQuestion(){
  G.phase='ratio';
  G.ratioHadError=false;
  var n1=SIDE_NAMES[G.q.first];
  var n2=SIDE_NAMES[G.q.second];
  var c1=SIDE_COLORS[G.q.first];
  var c2=SIDE_COLORS[G.q.second];
  var qEl=document.getElementById('ratio-question');
  qEl.innerHTML='<div class="frac-display"><div class="frac">'
    +'<div class="frac-num" style="color:'+c1+'">'+n1+'</div>'
    +'<div class="frac-line"></div>'
    +'<div class="frac-den" style="color:'+c2+'">'+n2+'</div>'
    +'</div></div>'
    +'<div class="ratio-q-text">是屬於哪一個三角比？</div>';
  /* reset buttons */
  var btns=document.querySelectorAll('.ratio-btn');
  for(var i=0;i<btns.length;i++){
    btns[i].className='ratio-btn';
  }
  document.getElementById('ratio-feedback').innerHTML='';
  document.getElementById('ratio-card').style.display='block';
  document.getElementById('ratio-card').style.animation='none';
  void document.getElementById('ratio-card').offsetHeight;
  document.getElementById('ratio-card').style.animation='slideUp .3s ease';
}

function handleRatioClick(chosen,btnEl){
  if(G.phase!=='ratio')return;
  var key=G.q.first+'_'+G.q.second;
  var correct=RATIO_MAP[key];
  if(chosen===correct){
    /* correct */
    btnEl.classList.add('correct-ratio');
    G.phase='done';
    G.ratioTotal++;
    var ratioPerf=!G.ratioHadError;
    G.ratioResults.push(ratioPerf);
    if(ratioPerf){G.ratioScore++}
    updateRatioScore();
    var fbEl=document.getElementById('ratio-feedback');
    if(ratioPerf){
      fbEl.innerHTML='<span style="color:var(--green)">✓ 正確！'+n1n2Ratio()+' = '+RATIO_NAMES[correct]+'</span>';
    }else{
      fbEl.innerHTML='<span style="color:var(--green)">✓ 答對了！'+n1n2Ratio()+' = '+RATIO_NAMES[correct]+'</span>';
    }
    /* disable all buttons */
    var btns=document.querySelectorAll('.ratio-btn');
    for(var i=0;i<btns.length;i++){btns[i].classList.add('disabled-ratio')}
    /* show next button */
    var btn=document.getElementById('next-btn');
    if(G.qNum>=TOTAL_QUESTIONS){
      btn.textContent='查看成績 →';
    }else{
      btn.textContent='下一題 →';
    }
    btn.style.display='block';
  }else{
    /* wrong */
    G.ratioHadError=true;
    btnEl.classList.add('wrong-ratio');
    btnEl.classList.add('disabled-ratio');
    document.getElementById('ratio-feedback').innerHTML='<span style="color:var(--red)">✗ '+RATIO_NAMES[chosen]+' 不正確，再試一次！</span>';
  }
}

function n1n2Ratio(){
  return SIDE_NAMES[G.q.first]+' / '+SIDE_NAMES[G.q.second];
}

function updateRatioScore(){
  document.getElementById('g-ratio-score').querySelector('span').textContent=G.ratioScore+'/'+G.ratioTotal;
}

/* ===== SIDE LABELS (after completion) ===== */
function showSideLabels(){
  var wrap=document.getElementById('tri-wrap');
  var svg=document.getElementById('tri-svg');
  var svgRect=svg.getBoundingClientRect();
  if(svgRect.width===0)return;
  var vbW=420,vbH=380;
  var scaleX=svgRect.width/vbW;
  var scaleY=svgRect.height/vbH;
  var keys=['hyp','opp','adj'];
  var names=['斜邊','對邊','鄰邊'];
  var colors=[SIDE_COLORS.hyp,SIDE_COLORS.opp,SIDE_COLORS.adj];
  var bgs=[SIDE_BG.hyp,SIDE_BG.opp,SIDE_BG.adj];
  for(var i=0;i<keys.length;i++){
    var s=G.sides[keys[i]];
    var mx=(s.from[0]+s.to[0])/2;
    var my=(s.from[1]+s.to[1])/2;
    var dx=G.centroid[0]-mx,dy=G.centroid[1]-my;
    var len=Math.sqrt(dx*dx+dy*dy);
    if(len>0){mx+=dx/len*22;my+=dy/len*22}
    var px=mx*scaleX;
    var py=my*scaleY;
    var lbl=document.createElement('div');
    lbl.className='side-label-wrap';
    lbl.style.left=px+'px';
    lbl.style.top=py+'px';
    lbl.style.animationDelay=(i*0.1)+'s';
    lbl.innerHTML='<span class="side-label-tag" style="background:'+bgs[i]+';color:'+colors[i]+'">'+names[i]+'</span>';
    wrap.appendChild(lbl);
  }
}

/* ===== RESULTS SCREEN ===== */
function animateRing(circleId,textId,score,total){
  var pct=total>0?score/total:0;
  document.getElementById(textId).textContent=score+'/'+total;
  var circle=document.getElementById(circleId);
  var circumference=2*Math.PI*52;
  var offset=circumference*(1-pct);
  circle.style.strokeDasharray=circumference.toFixed(2);
  circle.style.strokeDashoffset=circumference.toFixed(2);
  if(pct>=0.83){circle.style.stroke='var(--green)'}
  else if(pct>=0.5){circle.style.stroke='var(--amber)'}
  else{circle.style.stroke='var(--red)'}
  setTimeout(function(){circle.style.strokeDashoffset=offset.toFixed(2)},50);
}

function showResults(){
  var totalScore=G.score+G.ratioScore;
  var totalMax=TOTAL_QUESTIONS*2;
  var pct=totalScore/totalMax;
  var emoji,title,msg;
  if(pct===1){emoji='🏆';title='滿分！太厲害了！';msg='你完美地完成了所有題目，沒有任何錯誤！'}
  else if(pct>=0.83){emoji='🎉';title='非常出色！';msg='你對三角比有很好的掌握！'}
  else if(pct>=0.5){emoji='👍';title='做得不錯！';msg='繼續練習，你會越來越好！'}
  else{emoji='💪';title='繼續努力！';msg='多練習幾次，一定可以掌握！'}
  document.getElementById('results-emoji').textContent=emoji;
  document.getElementById('results-title').textContent=title;
  document.getElementById('results-msg').textContent=msg;
  animateRing('ring-fill','ring-text',G.score,TOTAL_QUESTIONS);
  animateRing('ring-fill-2','ring-text-2',G.ratioScore,TOTAL_QUESTIONS);
  var overlay=document.getElementById('results-overlay');
  overlay.classList.add('active');
  if(pct>=0.83){spawnConfetti()}
}

/* ===== INIT ===== */
</script>
